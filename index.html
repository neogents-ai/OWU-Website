<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Oakland Worker — Oakland Workers United</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=DM+Serif+Display&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Special+Elite&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  /* ---------- Tokens ---------- */
  :root {
    --paper: #f6efe1;
    --paper-2: #efe6d3;
    --ink: #1a1714;
    --ink-2: #453d33;
    --ink-3: #6a5f51;
    --rule: #1a1714;
    --accent: #b42318;
    --accent-2: #8a4a0e;
    --gold: #d2a14a;
    --paperline: rgba(26,23,20,0.08);
  }
  html { font-size: calc(20px * var(--tx, 1)); }
  body {
    margin: 0;
    background:
      radial-gradient(1200px 400px at 10% 0%, rgba(210,161,74,0.08), transparent 60%),
      repeating-linear-gradient(180deg, transparent 0 38px, var(--paperline) 38px 39px),
      var(--paper);
    color: var(--ink);
    font-family: "Source Serif 4", Georgia, "Times New Roman", serif;
    font-size: 1rem;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  * { box-sizing: border-box; }
  img { max-width: 100%; height: auto; display: block; }
  button { font: inherit; cursor: pointer; }
  a { color: var(--ink); }
  html { -webkit-text-size-adjust: 100%; touch-action: manipulation; }
  input, select, textarea { font-size: 16px; }

  .app { max-width: 1260px; margin: 0 auto; padding: 24px 28px 80px; }
  .visually-hidden { position:absolute; left:-9999px; }

  /* ---------- Rules ---------- */
  .rule { height: 1px; background: var(--rule); margin: 10px 0; }
  .rule-heavy { height: 3px; background: var(--rule); margin: 14px 0; }
  .rule-double {
    height: 6px;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    background: transparent;
    margin: 8px 0;
  }

  /* ---------- Masthead ---------- */
  .masthead { padding-bottom: 6px; }
  .masthead-top {
    display: grid; grid-template-columns: 1fr auto 1fr;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-2);
    padding: 4px 2px;
  }
  .masthead-meta-center { text-align: center; }
  .masthead-meta-right  { text-align: right; }
  .masthead-name { text-align: center; padding: 10px 0 8px; }
  .masthead-title {
    font-family: "DM Serif Display", "Playfair Display", serif;
    font-weight: 900;
    font-size: clamp(2.4rem, 6.2vw, 4.6rem);
    line-height: 0.95;
    letter-spacing: -0.01em;
    margin: 0;
    text-transform: none;
  }
  .masthead-motto {
    font-style: italic; color: var(--ink-2); margin-top: 8px; font-size: 1rem;
  }
  .masthead-nav {
    display: flex; align-items: center; flex-wrap: wrap;
    gap: 6px; padding: 8px 0;
  }
  .nav-item {
    background: transparent; border: 0; padding: 14px 18px;
    font-family: "DM Serif Display", serif;
    font-size: 1.05rem; color: var(--ink);
    border-bottom: 3px solid transparent; border-radius: 0;
    letter-spacing: 0.01em;
    text-transform: uppercase;
  }
  .nav-item:hover { background: rgba(26,23,20,0.06); }
  .nav-item.is-active { border-bottom-color: var(--accent); }
  .nav-item:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
  .nav-spacer { flex: 1; }

  /* ---------- Mini Player ---------- */
  .mini-player {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border: 2px solid var(--rule);
    background: var(--paper);
    box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    font-family: "JetBrains Mono", monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-2);
    max-width: 320px;
    transition: transform .25s ease, opacity .25s ease;
  }
  .mini-player.collapsed {
    transform: translateY(calc(100% + 30px));
    opacity: 0;
    pointer-events: none;
  }
  .mini-player-thumb {
    width: 56px;
    height: 56px;
    object-fit: cover;
    border: 1px solid var(--rule);
    flex-shrink: 0;
  }
  .mini-player-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }
  .mini-player-title {
    font-family: "DM Serif Display", serif;
    font-size: 0.95rem;
    text-transform: none;
    letter-spacing: 0;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mini-player-artist {
    font-size: 0.7rem;
    color: var(--ink-3);
  }
  .mini-player-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .mini-player-btn {
    background: var(--ink);
    color: var(--paper);
    border: 0;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    padding: 0;
    flex-shrink: 0;
  }
  .mini-player-btn:hover { background: var(--accent); }
  .mini-player-btn:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
  .mini-player-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9998;
    background: var(--ink);
    color: var(--paper);
    border: 2px solid var(--rule);
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    padding: 0;
  }
  .mini-player-toggle:hover { background: var(--accent); }
  .mini-player-toggle:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
  .mini-player-progress {
    width: 100%;
    height: 3px;
    background: var(--paper-2);
    margin-top: 4px;
    position: relative;
  }
  .mini-player-progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s linear;
  }

  /* ---------- Just In ticker ---------- */
  .justin {
    display: flex; align-items: stretch;
    border: 2px solid var(--rule);
    background: var(--ink); color: var(--paper);
    margin: 12px 0;
    overflow: hidden;
  }
  .justin-label {
    background: var(--accent); color: #fff;
    font-family: "DM Serif Display", serif;
    font-size: 1.1rem; letter-spacing: 0.12em;
    padding: 14px 18px; display: flex; align-items: center;
    border-right: 2px solid var(--rule);
    flex: 0 0 auto;
  }
  .justin-track { overflow: hidden; flex: 1; display: flex; align-items: center; }
  .justin-inner {
    display: flex; gap: 56px; padding: 14px 24px;
    white-space: nowrap;
    animation: ticker 60s linear infinite;
    font-family: "Source Serif 4", serif;
    font-size: 1rem;
  }
  .justin-item::before { content: "◆ "; color: var(--gold); }
  @keyframes ticker {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  @media (prefers-reduced-motion: reduce) {
    .justin-inner { animation: none; }
  }

  /* ---------- Typography utilities ---------- */
  .kicker, .section-kicker, .form-kicker, .caption strong, .footer-head, .rail-card-alt .rail-title {
    font-family: "JetBrains Mono", monospace;
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
    display: block;
  }
  .section-title, .big-title, .lede-headline, .band-title, .paper-footer .footer-brand {
    font-family: "DM Serif Display", "Playfair Display", serif;
    letter-spacing: -0.005em;
    line-height: 1.02;
    margin: 0;
  }
  .big-title { font-size: clamp(2.4rem, 5vw, 4rem); text-wrap: balance; }
  .deck { font-size: 1.3rem; font-style: italic; color: var(--ink-2); max-width: 900px; margin-top: 10px; }

  /* ---------- Front page lede ---------- */
  .lede-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 42px; margin-top: 18px; }
  .lede-headline { font-size: clamp(2.6rem, 5.4vw, 5rem); }
  .lede-subhead  { font-size: 1.3rem; font-style: italic; color: var(--ink-2); margin: 14px 0 10px; max-width: 780px; }
  .byline { font-family: "JetBrains Mono", monospace; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-3); margin-bottom: 10px; }
  .lede-body { column-count: 2; column-gap: 32px; font-size: 1.05rem; line-height: 1.7; margin-top: 10px; }
  .lede-body p { margin: 0 0 1em; break-inside: avoid; }
  .dropcap::first-letter {
    font-family: "DM Serif Display", serif; float: left; font-size: 4.6rem;
    line-height: 0.85; padding: 6px 10px 0 0; color: var(--accent);
  }
  .lede-cta { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 20px; }

  .btn-primary, .btn-secondary {
    font-family: "DM Serif Display", serif;
    font-size: 1.1rem;
    padding: 16px 24px;
    border: 2px solid var(--rule);
    text-transform: uppercase; letter-spacing: 0.04em;
    min-height: 56px;
  }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--ink); border-color: var(--ink); }
  .btn-primary:focus-visible, .btn-secondary:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
  .btn-secondary { background: var(--paper); color: var(--ink); }
  .btn-secondary:hover { background: var(--ink); color: var(--paper); }
  .btn-big { padding: 20px 24px; font-size: 1.2rem; min-height: 64px; width: 100%; }

  .lede-side { border-left: 1px solid var(--rule); padding-left: 24px; }
  .caption { font-family: "JetBrains Mono", monospace; font-size: 0.78rem; color: var(--ink-2); margin: 10px 0 20px; line-height: 1.4; }
  .caption strong { color: var(--ink); font-family: inherit; }
  .side-quote {
    border-top: 3px solid var(--rule);
    border-bottom: 3px solid var(--rule);
    padding: 18px 6px 18px;
    margin: 22px 0;
    position: relative;
  }
  .side-quote .q-mark {
    font-family: "DM Serif Display", serif;
    color: var(--accent); font-size: 4rem; line-height: 0.5;
    margin-bottom: 10px;
  }
  .side-quote p {
    font-family: "DM Serif Display", serif;
    font-size: 1.5rem; line-height: 1.2; margin: 0 0 12px;
  }
  .q-attr { font-family: "JetBrains Mono", monospace; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-2); }

  .counter-box { border: 2px solid var(--rule); padding: 18px; background: #fff; }
  .counter-label { font-family: "JetBrains Mono", monospace; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-2); }
  .counter-value { font-family: "DM Serif Display", serif; font-size: 3rem; margin: 2px 0 10px; display:flex; align-items: baseline; gap: 10px; }
  .counter-total { font-size: 1.2rem; color: var(--ink-3); }
  .counter-bar { height: 14px; background: var(--paper-2); border: 1px solid var(--rule); position: relative; overflow: hidden; }
  .counter-bar > div { height: 100%; background: repeating-linear-gradient(135deg, var(--accent) 0 10px, #8f1a11 10px 20px); }
  .counter-sub { margin-top: 8px; font-size: 0.95rem; color: var(--ink-2); }

  /* ---------- Value props grid ---------- */
  .section-head { display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap; margin: 20px 0 4px; }
  .section-head .section-title { font-size: clamp(1.8rem, 3vw, 2.6rem); }
  .section-head .section-kicker { margin-bottom: 0; }

  .props-section { margin-top: 18px; }
  .props-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    border-top: 1px solid var(--rule);
    border-left: 1px solid var(--rule);
    margin-top: 16px;
  }
  .prop {
    display: grid; grid-template-columns: 64px 1fr;
    gap: 14px;
    border-right: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    padding: 22px 20px;
  }
  .prop-num {
    font-family: "DM Serif Display", serif;
    font-size: 2.6rem; line-height: 1; color: var(--accent);
  }
  .prop-kicker { font-family: "JetBrains Mono", monospace; font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-2); }
  .prop-title { font-family: "DM Serif Display", serif; font-size: 1.35rem; line-height: 1.1; margin: 6px 0 10px; }

  /* ---------- Lie / Truth ---------- */
  .lt-section { margin-top: 18px; }
  .lt-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0;
    border-top: 1px solid var(--rule); border-left: 1px solid var(--rule); margin-top: 16px; }
  .lt-card {
    border-right: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
    padding: 22px 24px;
    background: #fff;
  }
  .lt-tag { font-family: "JetBrains Mono", monospace; font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .lt-card h4 { font-family: "DM Serif Display", serif; font-size: 1.5rem; margin: 0 0 10px; line-height: 1.1; }
  .lt-card p { margin: 0; }
  .lt-more { display: flex; justify-content: center; margin-top: 24px; }

  /* ---------- Editorial + SMS ---------- */
  .edit-sms { display: grid; grid-template-columns: 2fr 1fr; gap: 32px; margin-top: 18px; }
  .editorial {
    padding: 24px 28px;
    border: 3px double var(--rule);
    background: #fff;
  }
  .editorial .section-title { font-size: clamp(1.8rem, 3vw, 2.4rem); margin: 6px 0 14px; }
  .editorial-final { font-family: "DM Serif Display", serif; font-size: 1.5rem; color: var(--accent); }

  .inline-sms {
    background: var(--ink); color: var(--paper); padding: 24px; border: 3px solid var(--ink);
  }
  .inline-sms .section-kicker { color: var(--gold); }
  .inline-sms .section-title { color: var(--paper); font-size: 1.7rem; }
  .inline-sms p { color: rgba(246,239,225,0.85); }
  .inline-sms-form { display: flex; gap: 0; margin-top: 12px; }
  .inline-sms-form input {
    flex: 1; padding: 14px 14px; font-size: 1.1rem; min-height: 56px;
    border: 2px solid var(--paper); background: var(--paper); color: var(--ink);
    font-family: "Source Serif 4", serif;
  }
  .inline-sms-form .btn-primary { border-left: 0; }
  .inline-sms .disclaimer { font-size: 0.8rem; color: rgba(246,239,225,0.65); margin-top: 10px; line-height: 1.5; }
  .inline-sms .form-status { background: var(--gold); color: var(--ink); padding: 10px 12px; margin-top: 10px; font-weight: 700; }

  /* ---------- Page headers ---------- */
  .page-head { margin-top: 8px; }

  /* ---------- About two-col ---------- */
  .two-col { display: grid; grid-template-columns: 1.4fr 1fr; gap: 42px; margin-top: 18px; }
  .story {
    font-size: 1.1rem; line-height: 1.75;
    column-count: 1;
  }
  .story p { margin: 0 0 1.1em; }
  .story .dropcap { font-size: 1.18rem; }
  .pullquote {
    margin: 24px 0; padding: 18px 22px;
    border-left: 5px solid var(--accent);
    background: #fff;
    font-family: "DM Serif Display", serif;
    font-size: 1.5rem; line-height: 1.2; font-style: italic;
  }
  .signoff { font-family: "JetBrains Mono", monospace; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-2); margin-top: 26px; }

  .values-rail > * + * { margin-top: 18px; }
  .values-head {
    font-family: "DM Serif Display", serif; font-size: 1.6rem;
    border-bottom: 3px solid var(--rule); padding-bottom: 8px;
  }
  .value-row {
    display: grid; grid-template-columns: 1fr; padding: 14px 0;
    border-bottom: 1px solid var(--rule);
  }
  .value-word { font-family: "DM Serif Display", serif; font-size: 1.4rem; color: var(--accent); }
  .value-body { color: var(--ink-2); font-size: 1.02rem; }

  .rail-card {
    background: var(--ink); color: var(--paper);
    padding: 22px; text-align: center;
  }
  .rail-num {
    font-family: "DM Serif Display", serif; font-size: 4.4rem; line-height: 1;
  }
  .rail-num span { color: var(--gold); }
  .rail-num-label { font-family: "JetBrains Mono", monospace; font-size: 0.85rem; letter-spacing: 0.16em; text-transform: uppercase; margin-top: 8px; }
  .rail-card-alt { background: var(--paper-2); color: var(--ink); border: 2px solid var(--rule); text-align: left; }
  .rail-card-alt .rail-title { color: var(--accent); margin-bottom: 6px; }

  .commitment-band, .band-split {
    display: grid; grid-template-columns: 1fr auto; gap: 28px; align-items: center;
    padding: 26px; border: 3px solid var(--rule);
    background: #fff; margin-top: 22px;
  }
  .band-title { font-size: clamp(1.6rem, 3vw, 2.2rem); margin: 4px 0 10px; }

  /* ---------- Leadership ---------- */
  .founders-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
    border-top: 1px solid var(--rule); border-left: 1px solid var(--rule); margin-top: 18px; }
  .founder-col {
    border-right: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
    padding: 22px 22px 28px;
  }
  .founder-meta h3 { font-family: "DM Serif Display", serif; font-size: 1.8rem; margin: 12px 0 4px; }
  .founder-role { font-family: "JetBrains Mono", monospace; font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
  .founder-tags { display: flex; flex-direction: column; gap: 4px; margin: 10px 0 16px; font-size: 0.95rem; color: var(--ink-2); }
  .founder-quote {
    font-family: "DM Serif Display", serif; font-size: 1.4rem; line-height: 1.2;
    border-top: 3px solid var(--rule); border-bottom: 1px solid var(--rule);
    margin: 10px 0; padding: 14px 0;
  }
  .founder-body { font-size: 1.05rem; line-height: 1.65; }

  /* ---------- Founder photos ---------- */
  .founder-photo {
    width: 100%; aspect-ratio: 3/4;
    border: 2px solid var(--rule);
    background: var(--paper-2);
    overflow: hidden;
    filter: grayscale(0.15) contrast(1.02);
    box-shadow: 6px 6px 0 var(--rule);
  }
  .founder-photo img {
    width: 100%; height: 100%; object-fit: cover; object-position: center 20%;
  }

  /* ---------- Placeholder art ---------- */
  .placeholder {
    position: relative; width: 100%;
    background:
      repeating-linear-gradient(135deg,
        var(--paper-2) 0 18px,
        var(--paper) 18px 36px);
    border: 2px solid var(--rule);
    overflow: hidden;
  }
  .placeholder img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }
  .placeholder-label {
    position: absolute; inset: auto 10px 10px 10px;
    background: rgba(246,239,225,0.95); border: 1px solid var(--rule);
    padding: 6px 10px;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-2);
  }

  /* ---------- Get Involved ---------- */
  .forms-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 32px; margin-top: 20px; }
  .form-card {
    background: #fff; border: 3px solid var(--rule);
    padding: 28px;
  }
  .form-card h3 { font-family: "DM Serif Display", serif; font-size: 2rem; margin: 4px 0 10px; }
  .form-lede { color: var(--ink-2); margin-bottom: 18px; }
  .big-form { display: flex; flex-direction: column; gap: 16px; }
  .big-form label { display: flex; flex-direction: column; gap: 6px; }
  .big-form label span {
    font-family: "JetBrains Mono", monospace;
    font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-2);
  }
  .big-form input, .big-form select {
    padding: 16px 14px; font-size: 1.15rem; min-height: 56px;
    border: 2px solid var(--rule); background: var(--paper);
    font-family: "Source Serif 4", serif; color: var(--ink);
  }
  .big-form input:focus, .big-form select:focus {
    outline: 3px solid var(--gold); outline-offset: 2px;
  }
  .form-status {
    margin-top: 8px; padding: 14px 16px;
    background: var(--gold); color: var(--ink);
    border: 2px solid var(--rule);
    font-weight: 700;
  }
  .disclaimer {
    font-size: 0.88rem; color: var(--ink-2); margin-top: 14px; line-height: 1.5;
  }
  .form-side > * + * { margin-top: 22px; }
  .form-card-sms { background: var(--paper); }
  .goal-card {
    background: var(--ink); color: var(--paper); padding: 22px;
  }
  .goal-label { font-family: "JetBrains Mono", monospace; font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); }
  .goal-count { font-family: "DM Serif Display", serif; font-size: 3.2rem; line-height: 1; margin: 4px 0 12px; }
  .goal-count span { font-size: 1.2rem; color: rgba(246,239,225,0.7); }
  .goal-bar { height: 14px; background: rgba(246,239,225,0.15); border: 1px solid var(--paper); }
  .goal-bar > div { height: 100%; background: var(--gold); }
  .goal-sub { margin-top: 8px; font-size: 0.9rem; color: rgba(246,239,225,0.75); }

  .challenge-card {

    const VALUES = [

    const TRACKER_SEED = [
      { id: "OWU-2026-014", date: "2026-04-12", status: "Legal Action",  department: "Administration",  type: "Retaliation",         summary: "Memo issued restricting OWU organizers to standing only where the public stands, while permitting incumbent union activity in employee areas. Referred to labor counsel." },
      { id: "OWU-2026-011", date: "2026-03-29", status: "In Review",     department: "Public Works",    type: "Contract Violation",  summary: "Reported failure to post overtime opportunities per contract Article 9. Multiple members affected; documentation collected." },

    function InlineSmsCard() {
      const [phone, setPhone] = useState("");
      const [status, setStatus] = useState("");
      async function submit(e) {
        e.preventDefault();
        if (!phone) { setStatus("Please enter a phone number."); return; }
        setStatus("Sending…");
        try {
          const res = await fetch(FORMSPREE_URL, {
            method: 'POST',
            headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
            body: JSON.stringify({
              phone: phone,
              _subject: 'OWU SMS Opt-In (Front Page)',
              formType: 'sms-inline'
            })
          });
          if (res.ok) {
            setStatus("You're on the list. Watch for urgent updates.");
            setPhone("");
          } else {
            setStatus("Something went wrong. Please try again later.");
          }
        } catch (err) {
          setStatus("Network error. Please check your connection and try again.");
        }
      }
      return (
        <section className="inline-sms">
          <div className="section-kicker">Text Opt-In</div>
          <h3 className="section-title">Get The Record, Delivered To Your Phone</h3>
          <p>One or two messages a week. Never shared. Stop any time.</p>
          <form onSubmit={submit} className="inline-sms-form">

    function applyTweaks(t) {

    function TweaksPanel({ t, setT, visible }) {

        const next = { ...t, [k]: v };

    function MiniPlayer() {
      const [isPlaying, setIsPlaying] = useState(false);
      const [isExpanded, setIsExpanded] = useState(true);
      const [progress, setProgress] = useState(0);
      const audioRef = useRef(null);

      useEffect(() => {
        const audio = audioRef.current;
        if (!audio) return;
        const onTime = () => {
          if (audio.duration) setProgress((audio.currentTime / audio.duration) * 100);
        };
        const onEnded = () => setIsPlaying(false);
        audio.addEventListener('timeupdate', onTime);
        audio.addEventListener('ended', onEnded);
        return () => {
          audio.removeEventListener('timeupdate', onTime);
          audio.removeEventListener('ended', onEnded);
        };
      }, []);

      const togglePlay = () => {
        const audio = audioRef.current;
        if (!audio) return;
        if (isPlaying) { audio.pause(); setIsPlaying(false); }
        else { audio.play().then(() => setIsPlaying(true)).catch(() => {}); }
      };

      return (
        <>
          <button
            className="mini-player-toggle"
            aria-label={isExpanded ? "Hide music player" : "Show music player"}
            onClick={() => setIsExpanded(e => !e)}
            style={{ display: isExpanded ? 'none' : 'flex' }}
          >
            🎵
          </button>
          <div className={"mini-player " + (isExpanded ? "" : "collapsed")} role="region" aria-label="Music player">
            <img className="mini-player-thumb" src="daddy-marco.jpg" alt="Daddy Marco — Fight for Freedom" />
            <div className="mini-player-info">
              <div className="mini-player-title">Fight for Freedom</div>
              <div className="mini-player-artist">Daddy Marco</div>
              <div className="mini-player-controls">
                <button className="mini-player-btn" aria-label={isPlaying ? "Pause" : "Play"} onClick={togglePlay}>
                  {isPlaying ? "⏸" : "▶"}
                </button>
                <button className="mini-player-btn" aria-label="Hide player" onClick={() => setIsExpanded(false)}>
                  ✕
                </button>
              </div>
              <div className="mini-player-progress" aria-hidden="true">
                <div className="mini-player-progress-bar" style={{ width: progress + '%' }} />
              </div>
            </div>
            <audio ref={audioRef} src="daddy-marco.mp3" preload="none" />
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
